                else passCnt++;

                const badge = item.isFail 
                    ? `<span class="bg-red-100 text-red-700 text-[10px] font-bold px-2 py-0.5 rounded">Fail</span>` 
                    : `<span class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded">Pass</span>`;
                
                let judgeStr = `MFDS: ${item.mfdsPass ? 'Pass' : 'Fail'}`;
                if (internalInput) {
                    judgeStr += `<br><span class="${item.internalPass ? 'text-green-600 font-semibold' : 'text-red-600 font-bold'}">Internal: ${item.internalPass ? 'Pass' : 'Fail'}</span>`;
                }

                tBody.innerHTML += `
                    <tr>
                        <td class="px-4 py-3 border-b border-gray-100 font-medium text-gray-800">${item.param}</td>
                        <td class="px-4 py-3 border-b border-gray-100 ${item.isFail ? 'text-red-600 font-bold' : 'text-gray-600'}">${item.docValue}</td>
                        <td class="px-4 py-3 border-b border-gray-100 text-gray-600">${item.mfdsLimit}</td>
                        <td class="px-4 py-3 border-b border-gray-100 text-center text-xs leading-tight">
                            ${badge}<br><span class="inline-block mt-1">${judgeStr}</span>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('reportPassCount').textContent = passCnt;
            document.getElementById('reportFailCount').textContent = failCnt;

            const failItems = evaluatedGlobalData.filter(item => item.isFail);
            if(failItems.length === 0) {
                actionList.innerHTML = `<li class="text-sm text-green-600 font-bold"><i class="fa-solid fa-check-circle mr-2"></i>紐⑤뱺 ??ぉ??洹쒖젣 諛??щ궡 湲곗? 踰붿쐞 ?댁뿉 ?덉뒿?덈떎.</li>`;
            } else {
                failItems.forEach(item => {
                    actionList.innerHTML += `
                        <li class="flex items-start">
                            <i class="fa-solid fa-triangle-exclamation text-red-500 mt-1 mr-3"></i>
                            <div>
                                <p class="text-sm font-bold text-gray-800">?좑툘 [OOS/OOT] ${item.param} - ?덉쭏 ?됯? 蹂댁셿 ?붾쭩</p>
                                <p class="text-xs text-gray-600 mt-0.5">?곸꽭 ?ъ쑀: ?꾩옱 湲곗옱??'${item.docValue}'??洹쒖젣 ?먮뒗 ?щ궡 湲곗????댄깉?? ${item.action}</p>
                            </div>
                        </li>
                    `;
                });
            }

            // ?쒓컖??李⑦듃 ?뚮뜑留??몄텧
            renderChart(evaluatedGlobalData);
        }

        // --- ?슚 ?몄뇙 踰꾧렇 ?먯쿇 李⑤떒???꾪븳 ?먮컮?ㅽ겕由쏀듃 媛뺤젣 媛쒖엯 ?슚 ---
        // 釉뚮씪?곗????몄뇙 ??붿긽?먭? ?대━湲?吏곸쟾怨??ロ엺 吏곹썑???ㅽ뻾?⑸땲??
        window.addEventListener('beforeprint', () => {
            // 1. ?쇱옱 異쒕젰 諛⑹?: hidden ?대옒?ㅺ? ?덈뒗 ??? ?몄뇙 吏곸쟾 DOM ?덈꺼?먯꽌 ?꾩삁 display: none 諛뺤븘踰꾨┝ (?대뼡 CSS蹂대떎 媛뺣젰??
            const views = ['resultMissing', 'resultCompare', 'resultReport'];
            views.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    if(el.classList.contains('hidden')) {
                        el.style.setProperty('display', 'none', 'important');
                        el.style.setProperty('opacity', '0', 'important');
                    } else {
                        el.style.setProperty('display', 'block', 'important');
                    }
                }
            });

            // 2. ?щ＼ 鍮??섏씠吏 踰꾧렇 諛⑹?: ?ㅽ겕濡?諛?怨좎젙 ?믪씠 ?꾨꼍 ?댁젣
            const scrollContainers = document.querySelectorAll('.overflow-y-auto, .h-full, .h-screen, .flex-1, .flex, .flex-col');
            scrollContainers.forEach(el => {
                if(!el.classList.contains('hidden')) {
                    el.style.setProperty('overflow', 'visible', 'important');
                    el.style.setProperty('height', 'auto', 'important');
                    el.style.setProperty('max-height', 'none', 'important');
                }
            });
        });

        window.addEventListener('afterprint', () => {
            // ?몄뇙 ?꾨즺 ???몃씪???ㅽ????뺣━ (?먮옒 ?곹깭濡?蹂듦뎄)
            const views = ['resultMissing', 'resultCompare', 'resultReport'];
            views.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.style.removeProperty('display');
                    el.style.removeProperty('opacity');
                }
            });

            const scrollContainers = document.querySelectorAll('.overflow-y-auto, .h-full, .h-screen, .flex-1, .flex, .flex-col');
            scrollContainers.forEach(el => {
                el.style.removeProperty('overflow');
                el.style.removeProperty('height');
                el.style.removeProperty('max-height');
            });
        });
    </script>
</body>
</html>
